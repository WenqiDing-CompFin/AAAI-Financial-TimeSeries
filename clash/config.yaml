# Clash 固定端口 + 全局代理配置
# 适用：Clash / Clash Meta / Clash Premium / mihomo
#
# 固定端口约定（请勿随意修改，便于系统/浏览器统一走代理）：
#   HTTP / mixed : 7890
#   SOCKS5       : 7891
#   控制面板 API : 9090
#   DNS 监听     : 1053

# ---------- 固定端口 ----------
mixed-port: 7890
port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7893
allow-lan: true
bind-address: "*"
ipv6: false

# ---------- 全局代理 ----------
# global = 全部流量走代理；rule = 按规则；direct = 直连
mode: global
log-level: info

# 控制面板（Yacd / Dashboard）
external-controller: 0.0.0.0:9090
# 如需鉴权，取消下一行注释并设置密钥
# secret: "change-me"

# ---------- DNS ----------
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.120.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ---------- 代理节点（请替换为你的真实节点）----------
proxies:
  - name: "示例-SS"
    type: ss
    server: your-server.example.com
    port: 443
    cipher: aes-256-gcm
    password: "your-password"
    udp: true

  - name: "示例-VMess"
    type: vmess
    server: your-server.example.com
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    alterId: 0
    cipher: auto
    tls: true
    network: ws
    ws-opts:
      path: /
      headers:
        Host: your-server.example.com
    udp: true

  - name: "示例-Trojan"
    type: trojan
    server: your-server.example.com
    port: 443
    password: "your-password"
    sni: your-server.example.com
    skip-cert-verify: false
    udp: true

# ---------- 代理组 ----------
# mode: global 时，Clash 会使用内置 GLOBAL 组；这里额外提供可选分组方便手动切换
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 示例-SS
      - 示例-VMess
      - 示例-Trojan
      - DIRECT

  - name: AUTO
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 示例-SS
      - 示例-VMess
      - 示例-Trojan

# ---------- 规则（全局模式下仍保留兜底，切回 rule 时可直接用）----------
rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
